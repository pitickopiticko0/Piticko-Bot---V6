<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page_title }} · Piticko Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  {% if user %}
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">P</span>
      <span><strong>Piticko</strong><small>Dashboard V3</small></span>
    </a>
    <nav>
      <a href="/">Přehled</a>
      <a href="/health" target="_blank">Stav API</a>
    </nav>
    <div class="account">
      <div class="avatar">{{ (user.global_name or user.username or 'P')[:1] }}</div>
      <div><strong>{{ user.global_name or user.username }}</strong><small>Přihlášen</small></div>
      <a class="button subtle" href="/logout">Odhlásit</a>
    </div>
  </header>
  {% endif %}

  <main class="{% if not user %}auth-main{% endif %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='/dashboard.js') }}"></script>
</body>
</html>
